name: images

on:
  push:
    branches:
      - '**'

jobs:
  devcontainer:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    permissions:
      packages: write
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: image
      id: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      with:
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: smoke test
      run: ${{ steps.devcontainer.outputs.exec }} echo "hello world"
  devcontainers-cli:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    permissions:
      packages: write
    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: image
      id: devcontainer-cli
      uses: ./.github/workflows/actions/devcontainer
      with:
        name: devcontainers-cli
        config: .devcontainer/devcontainers.cli/devcontainer.json
        platform: ${{ matrix.platform }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: smoke test
      run: ${{ steps.devcontainer-cli.outputs.exec }} echo "hello world"
